<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان الموظفين - Bakery House</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --card: #212121; --border: #2e2e2e;
    --accent: #c8a96e; --accent-soft: rgba(200,169,110,0.12); --accent-glow: rgba(200,169,110,0.25);
    --text: #f0ece4; --muted: #888; --success: #4caf7d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
  body {
    background: var(--bg); color: var(--text); padding: 40px 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%);
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 40px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
  .q-label { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: block; color: var(--text); }
  textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: var(--text); resize: vertical; min-height: 100px; outline: none; }
  textarea:focus { border-color: var(--accent); }
  .scale-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .scale-wrap input { display: none; }
  .scale-wrap label { width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
  .scale-wrap input:checked + label { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
  .submit-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--accent), #e8c97a); border: none; border-radius: 15px; color: #000; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
  .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 style="color: var(--accent); font-weight: 900; font-size: 36px;">صوتك يهمنا</h1>
    <p style="color: var(--muted);">استبيان سري لبناء بيئة عمل أفضل</p>
  </div>

  <form action="https://formspree.io/f/xgorpwwg" method="POST">
    
    <div class="section">
      <div class="section-header">☕ القسم الأول: عين الزبون</div>
      <div class="question">
        <label class="q-label">١. لو الزبون كتب مراجعة صادقة عنا اليوم، إيش بيكتب؟</label>
        <textarea name="مراجعة_الزبون" required placeholder="اكتب بصراحة..."></textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-header">⚡ القسم الثاني: الشغل اليومي</div>
      <div class="question">
        <label class="q-label">٢. خطوة بشغلك بتحس إنها بتضيع وقت؟</label>
        <textarea name="خطوات_ضائعة" required></textarea>
      </div>
      <div class="question" style="margin-top:20px;">
        <label class="q-label">٣. كيف تقيم بيئة الشغل من 1 لـ 10؟</label>
        <div class="scale-wrap">
          <input type="radio" name="تقييم_البيئة" id="s1" value="1"><label for="s1">1</label>
          <input type="radio" name="تقييم_البيئة" id="s5" value="5"><label for="s5">5</label>
          <input type="radio" name="تقييم_البيئة" id="s10" value="10" checked><label for="s10">10</label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">💎 القسم الثالث: الصراحة الكاملة</div>
      <div class="question">
        <label class="q-label">٤. إيش الشي اللي الكل عارفه بس ما حد بيحكيه؟</label>
        <textarea name="الحقيقة_المسكوت_عنها" required placeholder="اكتب بجرأة..."></textarea>
      </div>
    </div>

    <button type="submit" class="submit-btn">✦ إرسال الإجابات فوراً</button>
  </form>
</div>
</body>
</html>
