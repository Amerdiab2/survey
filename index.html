<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakery House - استبيان الموظفين الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #c8a96e; --text: #f0ece4; --border: #2e2e2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px 15px; }
        .container { max-width: 700px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--accent); font-size: 32px; font-weight: 900; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        .section-title { color: var(--accent); font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .question { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #ccc; }
        textarea, select { width: 100%; background: #0f0f0f; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); outline: none; }
        .submit-btn { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>صوتك يهمنا</h1>
        <p>استبيان سري وشامل - Bakery House</p>
    </div>

    <form action="https://formspree.io/f/xgorpwwg" method="POST">
        <div class="section">
            <div class="section-title">☕ القسم الأول: عين الزبون</div>
            <div class="question"><label>١. لو الزبون كتب مراجعة صادقة عنا اليوم، إيش بيكتب؟</label><textarea name="q1" required></textarea></div>
            <div class="question"><label>٢. إيش اللي بيخلي الزبون يرجع مرة ثانية؟</label><textarea name="q2" required></textarea></div>
            <div class="question"><label>٣. الزبون دايم يسأل عن شي أو يشتكي من شي؟</label><textarea name="q3" required></textarea></div>
        </div>

        <div class="section">
            <div class="section-title">⚡ القسم الثاني: الشغل اليومي</div>
            <div class="question"><label>٤. خطوة بشغلك بتحس إنها بتضيع وقت؟</label><textarea name="q4" required></textarea></div>
            <div class="question"><label>٥. لو قدرت تغير شي واحد بطريقة الشغل، إيش بيكون؟</label><textarea name="q5" required></textarea></div>
            <div class="question"><label>٦. كيف تقيم بيئة الشغل عندنا؟</label><select name="q6"><option value="10">10 - ممتازة</option><option value="5">5 - متوسطة</option><option value="1">1 - سيئة</option></select></div>
        </div>

        <div class="section">
            <div class="section-title">🏢 القسم الثالث: لو كنت صاحب المكان</div>
            <div class="question"><label>٧. لو كنت المدير ليوم واحد، أول قرار بتاخذه إيش؟</label><textarea name="q7" required></textarea></div>
            <div class="question"><label>٨. في شي شايفه كل يوم بيضيع فلوس على الشركة؟</label><textarea name="q8" required></textarea></div>
            <div class="question"><label>٩. لو قدرت تضيف خدمة أو فكرة جديدة، إيش بتضيف؟</label><textarea name="q9" required></textarea></div>
        </div>

        <div class="section">
            <div class="section-title">🔒 القسم الخامس: الصراحة الكاملة</div>
            <div class="question"><label>١٥. إيش الشي اللي الكل عارفه بس ما حد بيحكيه؟</label><textarea name="q15" required></textarea></div>
            <div class="question"><label>١٦. لو صديقك سألك "أشتغل هناك؟" إيش بتقوله بصدق؟</label><textarea name="q16" required></textarea></div>
            <div class="question"><label>١٧. إيش محتاج يتغير عشان هالمكان يصير مكان أحلامك؟</label><textarea name="q17" required></textarea></div>
        </div>

        <button type="submit" class="submit-btn">✦ إرسال الاستبيان الكامل</button>
    </form>
</div>
</body>
</html>
