<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakery House - استبيان الموظفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #c8a96e; --text: #f0ece4; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        h1 { color: var(--accent); text-align: center; margin-bottom: 10px; font-weight: 900; }
        p { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px; }
        textarea, select, input[type="text"] {
            width: 100%; background: #252525; border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; color: var(--text); outline: none; transition: 0.3s; font-size: 15px;
        }
        textarea:focus { border-color: var(--accent); }
        .submit-btn {
            width: 100%; padding: 18px; background: var(--accent); color: #000; border: none;
            border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(200, 169, 110, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>صوتك يهمنا</h1>
        <p>استبيان سري لبناء بيئة عمل أفضل - Bakery House</p>

        <form action="https://formspree.io/f/xgorpwwg" method="POST">
            
            <div class="section">
                <label>اسم الموظف (اختياري):</label>
                <input type="text" name="اسم_الموظف" placeholder="اتركه فارغاً إذا أردت السرية">
            </div>

            <div class="section">
                <label>١. لو الزبون كتب مراجعة صادقة عنا اليوم، إيش بيكتب؟</label>
                <textarea name="مراجعة_الزبون" required placeholder="اكتب بصراحة..."></textarea>
            </div>

            <div class="section">
                <label>٢. خطوة بشغلك بتحس إنها بتضيع وقت؟</label>
                <textarea name="خطوة_ضائعة" required></textarea>
            </div>

            <div class="section">
                <label>٣. كيف تقيم بيئة العمل؟</label>
                <select name="تقييم_البيئة">
                    <option value="ممتازة">ممتازة</option>
                    <option value="جيدة">جيدة</option>
                    <option value="تحتاج تحسين">تحتاج تحسين</option>
                </select>
            </div>

            <div class="section">
                <label>٤. ملاحظات إضافية أو سرية:</label>
                <textarea name="ملاحظات_إضافية"></textarea>
            </div>

            <button type="submit" class="submit-btn">✦ إرسال الإجابات</button>
        </form>
    </div>
</body>
</html>
