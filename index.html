<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استبيان الموظفين</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("9hEiaDdCDACszilUM"); // الـ Public Key بتاعك
        })();
    </script>
    <style>
        /* التنسيقات العامة */
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #c8a96e;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .survey-container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .question-block { margin-bottom: 25px; }
        .question-title { margin-bottom: 10px; display: block; font-weight: bold; }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:disabled { background: #555; cursor: not-allowed; }
        #successScreen { display: none; text-align: center; padding: 40px; }
        .check-icon { font-size: 60px; color: #4CAF50; }
    </style>
</head>
<body>

<div class="survey-container">
    <div id="successScreen">
        <div class="check-icon">✅</div>
        <h2>شكراً على صراحتك يا بطل!</h2>
        <p>تم إرسال إجاباتك بنجاح لـ "اللمبة" عامر.</p>
    </div>

    <form id="surveyForm" onsubmit="event.preventDefault(); return false;">
        <h2>استبيان تقييم الموظفين 💡</h2>
        
        <div class="question-block">
            <label class="question-title">اسم الموظف:</label>
            <input type="text" name="employee_name" required placeholder="اكتب اسمك هنا...">
        </div>

        <div class="question-block">
            <label class="question-title">1. كيف تقيم بيئة العمل؟</label>
            <select name="q1">
                <option value="ممتازة">ممتازة</option>
                <option value="جيدة">جيدة</option>
                <option value="تحتاج تطوير">تحتاج تطوير</option>
            </select>
        </div>

        <div class="question-block">
            <label class="question-title">2. ملاحظات إضافية:</label>
            <textarea name="q2" rows="3"></textarea>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">✦ أرسل إجاباتي</button>
    </form>
</div>

<script>
    const form = document.getElementById('surveyForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        btn.textContent = '⏳ جاري الإرسال...';
        btn.disabled = true;

        const data = new FormData(form);
        const employeeName = data.get('employee_name');
        let messageBody = 👤 الموظف: ${employeeName}\n\n;

        // تجميع كل البيانات من الفورم تلقائياً
        for (let [key, value] of data.entries()) {
            if(key !== 'employee_name') {
                messageBody += ❓ ${key}: ${value}\n;
            }
        }

        // الإرسال لـ EmailJS
        emailjs.send('service_9eckxxk', 'template_4urs27l', {
            message: messageBody,
            name: employeeName
        })
        .then(() => {
            form.style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        })
        .catch((err) => {
            console.error('Error:', err);
            alert('حصل مشكلة في الإرسال.. اتأكد من النت وحاول تاني');
            btn.textContent = '✦ أرسل إجاباتي';
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
